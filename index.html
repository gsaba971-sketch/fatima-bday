<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد فاطمة 🌸</title>
    <style>
        body { background-color: #ffdae9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; overflow: hidden; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(216, 27, 96, 0.2); border: 4px solid #ff85b3; max-width: 400px; width: 90%; position: relative; }
        h1 { color: #d81b60; font-size: 18px; margin-bottom: 25px; }
        .btn-wrap { position: relative; height: 120px; width: 100%; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .yes-btn { background-color: #ff4081; color: white; }
        .no-btn { background-color: #fce4ec; color: #d81b60; border: 1px solid #ff85b3; }
        #final-stage { display: none; }
        img { width: 100%; border-radius: 15px; margin-top: 15px; }
        #manual-play { display: none; margin-top: 15px; background: #ff4081; color: white; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="q1" class="box">
        <h1>Do you think the birthday girl will finally stop her "silly" hobbies now that she’s a year older?</h1>
        <div class="btn-wrap">
            <button id="runYes" class="yes-btn" style="position: absolute; left: 10%;">Yes</button>
            <button class="no-btn" style="position: absolute; right: 10%;" onclick="nextStep()">No</button>
        </div>
    </div>

    <div id="q2" class="box" style="display: none;">
        <h1>Are you ready?</h1>
        <div class="btn-wrap">
            <button id="runNo" class="no-btn" style="position: absolute; right: 10%;">No</button>
            <button class="yes-btn" style="position: absolute; left: 10%;" onclick="showSurprise()">Yes</button>
        </div>
    </div>

    <div id="final-stage" class="box">
        <h1 style="font-size: 24px;">HAPPY BIRTHDAY FATIMA! 🎉🎂</h1>
        <img src="cake_img.jpg" alt="Fatima Birthday">
        <p style="color: #d81b60; font-weight: bold;">سنة حلوة يا جميل! 🎈</p>
        <div id="manual-play" onclick="playMusic()">اضغطي هنا لتشغيل الأغنية 🎵</div>
    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('music');

        // ميزة الهروب للأزرار
        function makeButtonRun(btnId) {
            const btn = document.getElementById(btnId);
            btn.addEventListener('mouseover', () => {
                const x = Math.random() * (window.innerWidth - btn.offsetWidth);
                const y = Math.random() * (window.innerHeight - btn.offsetHeight);
                btn.style.position = 'fixed';
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
            });
        }

        makeButtonRun('runYes');

        function nextStep() {
            document.getElementById('q1').style.display = 'none';
            document.getElementById('q2').style.display = 'block';
            makeButtonRun('runNo');
        }

        function showSurprise() {
            document.getElementById('q2').style.display = 'none';
            document.getElementById('final-stage').style.display = 'block';
            playMusic();
        }

        function playMusic() {
            // محاولة التشغيل
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    // إذا فشل التشغيل التلقائي، أظهر زر التشغيل اليدوي
                    document.getElementById('manual-play').style.display = 'block';
                });
            }
        }
    </script>
</body>
</html>
